<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LzPvP | Unofficial Fansite</title>
    
    <link rel="icon" href="LzPvP.png" type="image/png">
    
    <meta property="og:title" content="【非公式】LzPvP | ファンサイト">
    <meta property="og:description" content="1.21対応の最新PvPサーバー「LzPvP」の非公式ファンサイト。">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://cahju2.github.io/LzPvP/humisan.png">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 🎉 紙吹雪（カラーを戻して少し華やかに） */
        .confetti-piece {
            position: absolute;
            width: 5px;
            height: 5px;
            pointer-events: none;
            z-index: 9999;
            animation: confetti-fall 0.7s ease-out forwards;
        }
        @keyframes confetti-fall {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(var(--dr)); opacity: 0; }
        }

        /* 🎊 正式リリースバッジ（ネオンラインで質感を出す） */
        .release-badge {
            display: inline-block;
            border: 1px solid rgba(0, 255, 255, 0.4);
            background: rgba(0, 255, 255, 0.05);
            color: #00ffff;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 4px 16px;
            border-radius: 50px;
            margin-bottom: 15px;
            letter-spacing: 0.1em;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.1);
        }

        /* IPカード */
        .ip-card {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .ip-card:hover {
            border-color: rgba(0, 255, 255, 0.5) !important;
            background: rgba(0, 255, 255, 0.05) !important;
        }
        .ip-card:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <header>
        <div class="logo">
            <img src="LzPvP.png" alt="" class="logo-img">
            <span>LzPvP</span>
            <small data-i18n="unofficial">UNOFFICIAL</small>
        </div>
        
        <div class="header-right">
            <div class="lang-switcher">
                <span id="lang-jp" class="lang-btn active" onclick="switchLang('ja')">JP</span>
                <span class="lang-divider">/</span>
                <span id="lang-en" class="lang-btn" onclick="switchLang('en')">EN</span>
            </div>
            <div class="status-tag" id="player-count" data-i18n="loading">読み込み中...</div>
        </div>
    </header>

    <main class="hero">
        <div class="hero-content">
            <!-- 祝！正式リリース -->
            <div class="release-badge" data-i18n="release_msg">OFFICIAL RELEASE</div>
            
            <h1 class="main-title">LzPvP</h1>
            
            <!-- IPを as. なしに修正 -->
            <div class="ip-card" onclick="copyIP(); playPopSound(); spawnConfetti(event);" id="ip-val">
                <span class="ip-text">lzpvp.xyz</span>
                <span class="copy-hint" data-i18n="click_copy">CLICK TO COPY IP</span>
            </div>
            
            <div class="links-group">
                <a href="https://discord.gg/gYcNZgGmkE" class="btn btn-primary" target="_blank" rel="noopener noreferrer" data-i18n="discord">Official Discord</a>
                <a href="rule/" class="btn btn-secondary" data-i18n="rule">Rules</a>
                <a href="love/" class="btn btn-secondary" data-i18n="love_page">Special Fan Page</a>
                <a href="https://github.com/cahju2/LzPvP" class="btn btn-secondary" target="_blank" rel="noopener noreferrer">GitHub</a>
            </div>
        </div>
    </main>

    <!-- サーバーステータス -->
    <section class="content-section">
        <div class="mc-server-card">
            <img src="LzPvP.png" alt="Server Icon" class="mc-icon" id="mc-icon">
            <div class="mc-info">
                <div class="mc-top-row">
                    <span class="mc-name">LzPvP</span>
                    <span class="mc-players" id="mc-players-card">0/0</span>
                </div>
                <div class="mc-motd" id="mc-motd"></div>
            </div>
            <div class="mc-ping" id="mc-ping"></div>
        </div>
    </section>

    <!-- Kit一覧 -->
    <section class="content-section">
        <div class="glass-card">
            <h2 data-i18n="kits_title">Available Kits</h2>
            <div class="kit-grid">
                <div class="kit-item" data-tooltip="1.21 Mace focus.">Mace</div>
                <div class="kit-item" data-tooltip="Diamond set with Mace.">DiamondMace</div>
                <div class="kit-item" data-tooltip="End Crystal combat.">Crystal</div>
                <div class="kit-item" data-tooltip="Diamond set Crystal.">DiamondCrystal</div>
                <div class="kit-item" data-tooltip="PvP Tiers Pot.">PotPvPTiers</div>
                <div class="kit-item" data-tooltip="MCTiers UHC.">UHCMCTiers</div>
                <div class="kit-item" data-tooltip="Classic UHC.">UHC</div>
                <div class="kit-item" data-tooltip="Axe & Shield.">Axe</div>
                <div class="kit-item" data-tooltip="Netherite Pot.">NethPot</div>
                <div class="kit-item" data-tooltip="Ring out match.">Sumo</div>
            </div>
        </div>
    </section>

    <footer>
        <p data-i18n="footer_text">This site is an unofficial fan site.</p>
    </footer>

    <script>
        const translations = {
            ja: {
                release_msg: "🎉 正式リリース 🎉",
                unofficial: "非公式", kits_title: "実装済みのKit一覧",
                footer_text: "このサイトは非公式に制作されたファンサイトです。", loading: "読み込み中...",
                click_copy: "クリックでコピー", discord: "公式Discord", rule: "ルール確認", love_page: "ガチ推し特設"
            },
            en: {
                release_msg: "OFFICIAL RELEASE",
                unofficial: "UNOFFICIAL", kits_title: "Available Kits",
                footer_text: "This is an unofficial fan site.", loading: "Loading...",
                click_copy: "CLICK TO COPY IP", discord: "Official Discord", rule: "Rules", love_page: "Special Fan Page"
            }
        };

        function switchLang(lang) {
            document.getElementById('lang-jp').classList.toggle('active', lang === 'ja');
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) el.innerHTML = translations[lang][key];
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const userLang = navigator.language || navigator.userLanguage;
            switchLang(userLang.startsWith('ja') ? 'ja' : 'en');
        });

        function playPopSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const bufferSize = audioCtx.sampleRate * 0.06;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) { data[i] = (Math.random() * 2 - 1) * 0.3; }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
                const gainNode = audioCtx.createGain();
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.06);
                noise.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                noise.start();
                noise.stop(audioCtx.currentTime + 0.06);
                setTimeout(() => audioCtx.close(), 120);
            } catch (e) {}
        }

        function spawnConfetti(e) {
            const colors = ['#00ffff', '#ff00ff', '#ffffff', '#ffff00'];
            const count = 20;
            const rect = e.currentTarget.getBoundingClientRect();
            const startX = rect.left + (rect.width / 2) + window.scrollX;
            const startY = rect.top + (rect.height / 2) + window.scrollY;

            for (let i = 0; i < count; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.left = startX + 'px';
                piece.style.top = startY + 'px';
                const angle = Math.random() * Math.PI * 2;
                const distance = 40 + Math.random() * 70;
                piece.style.setProperty('--dx', Math.cos(angle) * distance + 'px');
                piece.style.setProperty('--dy', Math.sin(angle) * distance + 'px');
                piece.style.setProperty('--dr', (Math.random() * 360) + 'deg');
                document.body.appendChild(piece);
                setTimeout(() => piece.remove(), 700);
            }
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
